name: CI/CD Test

on:
  push:
    branches: ["main"]

jobs:
  api_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install Newman
        run: npm install -g newman
      - name: Install dotnet project dependencies
        run: |
          cd server # Om din lösningsfil är i root, ändra denna rad så den matchar din struktur
          dotnet restore ../formbridge.sln  # Lägg till lösningsfilen i kommandot
      - name: Build
        run: |
          cd server # Om du har en mappstruktur, justera den här
          dotnet build ../formbridge.sln
      - name: Start Server
        run: cd server && nohup dotnet run &
      - name: Run API-Tests
        run: newman run ./api-test/Test.postman_collection.json

  gui_tests:
    runs-on: ubuntu-latest
    needs: api_tests # Kör endast om api testerna går igenom
    steps:
      - uses: actions/checkout@v4
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Install dotnet project dependencies
        run: |
          cd server # Om lösningen är i en annan mapp, justera det här
          dotnet restore ../formbridge.sln  # Återigen, peka på lösningsfilen
      - name: Build/Restore Playwright Project
        run: cd ShopTester.Tests && dotnet build
      - name: Ensure browsers are installed
        run: cd ShopTester.Tests && pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps
      - name: Start server
        run: cd server && nohup dotnet run &
      - name: Run GUI-tests
        run: cd ShopTester.Tests && dotnet test

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [api_tests, gui_tests] # Kör endast om alla tidigare tester är OK
    steps:
      - name: Deploy App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: | 
            source /root/.nvm/nvm.sh
            nvm use v20.12.2
            cd /srv/www/formbridge
            git pull
            cd client
            npm ci
            npm run build
            cd ../server
            dotnet restore ../formbridge.sln  # Se till att använda rätt lösning
            pm2 stop formbridge
            pm2 delete formbridge
            pm2 start "dotnet run" --name formbridge
